version: '3.9'
services:
  app:
    build: .
    ports:
      - '5173:5173'
      - '5000:5000'
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/learn-by-hariom
    depends_on:
      - mongo
  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
volumes:
  mongo-data:
